<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StepWise Form UI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <section>
        <div class="container">
            <form>
                <div class="step step-1 active">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input autocomplete="off" type="text" id="firstName" name="first-name" placeholder="Enter your first name">
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input autocomplete="off" type="text" id="lastName" name="last-name" placeholder="Enter your last name">
                    </div>
                    <div class="form-group">
                        <label for="nickName">Nick Name</label>
                        <input autocomplete="off" type="text" id="nickName" name="nick-name" placeholder="Enter your nick name">
                    </div>
                    <button type="button" class="next-btn">Next</button>
                </div>
                <div class="step step-2">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input autocomplete="off" type="email" id="email" name="email" placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone</label>
                        <input type="number" id="phone" name="phone-number" placeholder="Enter your phone number">
                    </div>
                    <button type="button" class="previous-btn">Prev</button>
                    <button type="button" class="next-btn">Next</button>
                </div>
                <div class="step step-3">
                    <div class="form-group">
                        <label for="country">Country</label>
                        <input type="text" id="country" name="country" placeholder="Enter your country">
                    </div>
                    <div class="form-group">
                        <label for="city">City</label>
                        <input autocomplete="off" type="text" id="city" name="city" placeholder="Enter your city">
                    </div>
                    <div class="form-group">
                        <label for="postCode">Post Code</label>
                        <input type="text" id="postCode" name="post-code" placeholder="Enter your post code">
                    </div>
                    <button type="button" class="previous-btn">Prev</button>
                    <button type="submit" class="submit-btn">Submit</button>
                </div>
            </form>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
